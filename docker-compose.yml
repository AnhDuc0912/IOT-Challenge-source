version: '3.8'
services:
  backend:
    build:
      context: ./IOT_challenge_BE
    container_name: iot-backend
    ports:
      - "3000:3000"
    env_file:
      - ./IOT_challenge_BE/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"] # Thay bằng endpoint kiểm tra sức khỏe
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./IOT_challenge
    container_name: iot-frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy # Chờ backend khỏe mạnh
    environment:
      - VITE_API_ENDPOINT=http://iot-backend:3000/api
    restart: unless-stopped