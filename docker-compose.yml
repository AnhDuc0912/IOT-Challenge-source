version: '3.8'

services:
  backend:
    build:
      context: ./IOT_challenge_BE
    container_name: iot-backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env

  frontend:
    build:
      context: ./IOT_challenge
    container_name: iot-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
